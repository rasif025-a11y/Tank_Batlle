<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tank Battle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; }
canvas { border: 3px solid #e94560; border-radius: 4px; background: #2d2d2d; box-shadow: 0 0 30px rgba(233,69,96,0.3); }
</style>
</head>
<body>
<canvas id="game" width="600" height="600"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const TILE = 30;
const COLS = 20;
const ROWS = 20;
const W = canvas.width;
const H = canvas.height;

// Directions
const UP = 0, RIGHT = 1, DOWN = 2, LEFT = 3;
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

// Map: 0=empty, 1=wall, 2=brick
const map = [];

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playShoot() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
}
function playExplode() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.4);
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}
function playBoss() {
    const notes = [200, 250, 300, 400];
    notes.forEach((f, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'square';
        osc.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.12);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.12);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.12 + 0.15);
        osc.start(audioCtx.currentTime + i * 0.12); osc.stop(audioCtx.currentTime + i * 0.12 + 0.15);
    });
}
function playWin() {
    [523, 659, 784, 1047].forEach((f, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.15);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.15 + 0.3);
        osc.start(audioCtx.currentTime + i * 0.15); osc.stop(audioCtx.currentTime + i * 0.15 + 0.3);
    });
}

function isSpawn(x, y) {
    const spawns = [[9, 18], [2, 2], [17, 2], [2, 17], [17, 17]];
    return spawns.some(([sx, sy]) => Math.abs(x - sx) <= 1 && Math.abs(y - sy) <= 1);
}

function generateMap() {
    for (let y = 0; y < ROWS; y++) {
        map[y] = [];
        for (let x = 0; x < COLS; x++) {
            if (x === 0 || y === 0 || x === COLS - 1 || y === ROWS - 1) {
                map[y][x] = 1;
            } else if (Math.random() < 0.25 && !isSpawn(x, y) && !(x >= 8 && x <= 11 && y >= 8 && y <= 11)) {
                map[y][x] = 2;
            } else {
                map[y][x] = 0;
            }
        }
    }
}

// Entities
let player, enemies, boss, bullets, particles;
let keys = {};
let gameState = 'playing'; // 'playing', 'boss', 'won', 'lost'

function createTank(x, y, dir, color, isPlayer = false) {
    const s = TILE * 0.8;
    return { x, y, dir, color, isPlayer, speed: isPlayer ? 2 : 1.2, cooldown: 0, alive: true, hp: isPlayer ? 1 : 1, shootTimer: 0, w: s, h: s };
}

function createBullet(x, y, dir, owner) {
    return { x, y, dir, owner, speed: 4, alive: true };
}

function spawnParticles(x, y, color, count = 15) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = Math.random() * 3 + 1;
        particles.push({
            x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
            life: 30 + Math.random() * 20, maxLife: 50, color, size: 3 + Math.random() * 4
        });
    }
}

function initGame() {
    generateMap();
    player = createTank(9.5 * TILE, 18 * TILE, UP, '#4FC3F7', true);
    enemies = [];
    const spawns = [[2, 2], [17, 2], [2, 17], [17, 17]];
    spawns.forEach(([sx, sy]) => {
        enemies.push(createTank(sx * TILE + TILE/2, sy * TILE + TILE/2, DOWN, '#E53935'));
    });
    boss = null;
    bullets = [];
    particles = [];
    gameState = 'playing';
}

function rectCollide(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function canMove(x, y, w, h, ignore) {
    if (x < 0 || y < 0 || x + w > W || y + h > H) return false;
    const cx1 = Math.floor(x / TILE);
    const cy1 = Math.floor(y / TILE);
    const cx2 = Math.floor((x + w - 1) / TILE);
    const cy2 = Math.floor((y + h - 1) / TILE);
    for (let ty = cy1; ty <= cy2; ty++) {
        for (let tx = cx1; tx <= cx2; tx++) {
            if (map[ty] && (map[ty][tx] === 1 || map[ty][tx] === 2)) return false;
        }
    }
    // Check entity collision
    const rect = { x, y, w, h };
    const all = [];
    if (player && player.alive && player !== ignore) all.push(player);
    if (enemies) enemies.forEach(e => { if (e.alive && e !== ignore) all.push(e); });
    if (boss && boss.alive && boss !== ignore) all.push(boss);
    for (const e of all) {
        const er = { x: e.x - e.w/2, y: e.y - e.h/2, w: e.w, h: e.h };
        if (rectCollide(rect, er)) return false;
    }
    return true;
}

function moveTank(tank, dir) {
    tank.dir = dir;
    const spd = tank.speed;
    const s = TILE * 0.8;
    let nx = tank.x + DX[dir] * spd;
    let ny = tank.y + DY[dir] * spd;
    if (canMove(nx - s/2, tank.y - s/2, s, s, tank)) tank.x = nx;
    if (canMove(tank.x - s/2, ny - s/2, s, s, tank)) tank.y = ny;
}

function shoot(tank) {
    if (tank.cooldown > 0) return;
    const bx = tank.x + DX[tank.dir] * 18;
    const by = tank.y + DY[tank.dir] * 18;
    bullets.push(createBullet(bx, by, tank.dir, tank));
    tank.cooldown = 15;
    playShoot();
}

function updateBullets() {
    for (const b of bullets) {
        if (!b.alive) continue;
        b.x += DX[b.dir] * b.speed;
        b.y += DY[b.dir] * b.speed;
        if (b.x < 0 || b.x > W || b.y < 0 || b.y > H) { b.alive = false; continue; }
        // Wall hit
        const tx = Math.floor(b.x / TILE);
        const ty = Math.floor(b.y / TILE);
        if (map[ty] && map[ty][tx] === 2) {
            map[ty][tx] = 0;
            b.alive = false;
            spawnParticles(b.x, b.y, '#8B4513', 8);
            return;
        }
        if (map[ty] && map[ty][tx] === 1) { b.alive = false; return; }
        // Hit enemies
        if (b.owner === player) {
            for (const e of enemies) {
                if (!e.alive) continue;
                const s = TILE * 0.8;
                if (Math.abs(b.x - e.x) < s/2 && Math.abs(b.y - e.y) < s/2) {
                    e.alive = false; b.alive = false;
                    spawnParticles(e.x, e.y, '#E53935');
                    playExplode();
                    if (enemies.every(en => !en.alive)) {
                        if (!boss) {
                            spawnBoss();
                        }
                    }
                    return;
                }
            }
            if (boss && boss.alive) {
                const s = TILE * 1.2;
                if (Math.abs(b.x - boss.x) < s/2 && Math.abs(b.y - boss.y) < s/2) {
                    boss.hp--;
                    b.alive = false;
                    spawnParticles(b.x, b.y, '#FFD700', 10);
                    if (boss.hp <= 0) {
                        boss.alive = false;
                        spawnParticles(boss.x, boss.y, '#FFD700', 30);
                        playWin();
                        gameState = 'won';
                    }
                    return;
                }
            }
        } else {
            // Enemy/boss bullet hits player
            if (player && player.alive) {
                const s = TILE * 0.8;
                if (Math.abs(b.x - player.x) < s/2 && Math.abs(b.y - player.y) < s/2) {
                    player.alive = false; b.alive = false;
                    spawnParticles(player.x, player.y, '#4FC3F7');
                    playExplode();
                    gameState = 'lost';
                    return;
                }
            }
        }
    }
    bullets = bullets.filter(b => b.alive);
}

function spawnBoss() {
    boss = createTank(W/2, TILE * 1.5, DOWN, '#FFD700');
    boss.speed = 1.5;
    boss.hp = 10;
    boss.maxHp = 10;
    boss.w = TILE * 1.4;
    boss.h = TILE * 1.4;
    player.speed = 2.5;
    gameState = 'boss';
    playBoss();
}

function enemyAI(tank) {
    if (!tank.alive) return;
    tank.shootTimer--;
    if (tank.shootTimer <= 0) {
        // Simple AI: move random, shoot toward player
        if (Math.random() < 0.02) {
            tank.dir = Math.floor(Math.random() * 4);
        }
        moveTank(tank, tank.dir);
        if (Math.random() < 0.03 || Math.abs(tank.x - player.x) < TILE * 3) {
            const dx = player.x - tank.x;
            const dy = player.y - tank.y;
            if (Math.abs(dx) > Math.abs(dy)) {
                tank.dir = dx > 0 ? RIGHT : LEFT;
            } else {
                tank.dir = dy > 0 ? DOWN : UP;
            }
            shoot(tank);
            tank.shootTimer = 30 + Math.random() * 40;
        }
    }
}

function bossAI() {
    if (!boss || !boss.alive) return;
    boss.shootTimer--;
    const dx = player.x - boss.x;
    const dy = player.y - boss.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > TILE * 3) {
        // Move toward player
        if (Math.abs(dx) > Math.abs(dy)) {
            moveTank(boss, dx > 0 ? RIGHT : LEFT);
        } else {
            moveTank(boss, dy > 0 ? DOWN : UP);
        }
    } else {
        // Strafe
        if (Math.random() < 0.02) boss.dir = Math.floor(Math.random() * 4);
        moveTank(boss, boss.dir);
    }
    if (boss.shootTimer <= 0) {
        const adx = player.x - boss.x;
        const ady = player.y - boss.y;
        if (Math.abs(adx) > Math.abs(ady)) {
            boss.dir = adx > 0 ? RIGHT : LEFT;
        } else {
            boss.dir = ady > 0 ? DOWN : UP;
        }
        shoot(boss);
        boss.shootTimer = 15 + Math.random() * 20;
    }
}

function drawTank(tank) {
    if (!tank.alive) return;
    const s = tank.w || TILE * 0.8;
    const hw = s / 2;
    ctx.save();
    ctx.translate(tank.x, tank.y);
    ctx.rotate(tank.dir * Math.PI / 2);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(-hw + 3, -hw + 3, s, s);

    // Body
    ctx.fillStyle = tank.color;
    ctx.fillRect(-hw, -hw, s, s);

    // Tracks
    ctx.fillStyle = '#333';
    ctx.fillRect(-hw - 2, -hw, 4, s);
    ctx.fillRect(hw - 2, -hw, 4, s);

    // Turret
    ctx.fillStyle = '#fff';
    ctx.fillRect(-4, -hw - 4, 8, 10);

    // Center
    ctx.fillStyle = tank.isPlayer ? '#0288D1' : '#B71C1C';
    ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();

    ctx.restore();

    // HP bar for boss
    if (tank.maxHp && tank.hp > 0) {
        const bw = 40;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(tank.x - bw/2, tank.y - hw - 14, bw, 6);
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(tank.x - bw/2, tank.y - hw - 14, bw * (tank.hp / tank.maxHp), 6);
    }
}

function drawMap() {
    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            if (map[y][x] === 1) {
                ctx.fillStyle = '#555';
                ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
                ctx.strokeStyle = '#444';
                ctx.strokeRect(x * TILE, y * TILE, TILE, TILE);
            } else if (map[y][x] === 2) {
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
                ctx.strokeStyle = '#6B3410';
                ctx.strokeRect(x * TILE, y * TILE, TILE, TILE);
                ctx.fillStyle = '#A0522D';
                ctx.fillRect(x * TILE + 2, y * TILE + 2, TILE/2 - 2, TILE/2 - 2);
                ctx.fillRect(x * TILE + TILE/2, y * TILE + 2, TILE/2 - 2, TILE/2 - 2);
                ctx.fillRect(x * TILE + 2, y * TILE + TILE/2, TILE/2 - 2, TILE/2 - 2);
                ctx.fillRect(x * TILE + TILE/2, y * TILE + TILE/2, TILE/2 - 2, TILE/2 - 2);
            }
        }
    }
}

function drawBullets() {
    for (const b of bullets) {
        ctx.fillStyle = '#FFD700';
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#FFD700';
        ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
    }
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawEnemyCount() {
    const alive = enemies.filter(e => e.alive).length;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(5, 5, 120, 24);
    ctx.fillStyle = '#fff';
    ctx.font = '14px "Courier New"';
    ctx.textAlign = 'left';
    ctx.fillText('Enemies: ' + alive + '/4', 12, 22);
}

function update() {
    if (gameState === 'won' || gameState === 'lost') {
        updateParticles();
        return;
    }

    // Player input
    if (player && player.alive) {
        if (keys['ArrowUp'] || keys['KeyW']) moveTank(player, UP);
        else if (keys['ArrowDown'] || keys['KeyS']) moveTank(player, DOWN);
        else if (keys['ArrowLeft'] || keys['KeyA']) moveTank(player, LEFT);
        else if (keys['ArrowRight'] || keys['KeyD']) moveTank(player, RIGHT);
        if (player.cooldown > 0) player.cooldown--;
        if (keys['Space']) shoot(player);
    }

    // Enemy AI
    enemies.forEach(enemyAI);
    if (gameState === 'boss') bossAI();

    // Update cooldowns
    enemies.forEach(e => { if (e.cooldown > 0) e.cooldown--; });
    if (boss && boss.cooldown > 0) boss.cooldown--;

    updateBullets();
    updateParticles();

    if (player && !player.alive) gameState = 'lost';
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    for (let x = 0; x < COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * TILE, 0); ctx.lineTo(x * TILE, H); ctx.stroke();
    }
    for (let y = 0; y < ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * TILE); ctx.lineTo(W, y * TILE); ctx.stroke();
    }

    drawMap();
    drawBullets();
    if (player) drawTank(player);
    enemies.forEach(drawTank);
    if (boss) drawTank(boss);
    drawParticles();
    drawEnemyCount();

    // Boss warning
    if (gameState === 'boss' && boss && boss.alive) {
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 20px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('⚡ BOSS ⚡', W/2, 50);
    }

    // Win / Lose
    if (gameState === 'won') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(W/2 - 160, H/2 - 60, 320, 120);
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 36px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('VICTORY!', W/2, H/2 + 10);
        ctx.fillStyle = '#aaa';
        ctx.font = '14px "Courier New"';
        ctx.fillText('Press R to restart', W/2, H/2 + 45);
    }
    if (gameState === 'lost') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(W/2 - 160, H/2 - 60, 320, 120);
        ctx.fillStyle = '#E53935';
        ctx.font = 'bold 36px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W/2, H/2 + 10);
        ctx.fillStyle = '#aaa';
        ctx.font = '14px "Courier New"';
        ctx.fillText('Press R to restart', W/2, H/2 + 45);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Controls
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space') e.preventDefault();
    if (e.code === 'KeyR' && (gameState === 'won' || gameState === 'lost')) initGame();
});
window.addEventListener('keyup', (e) => { keys[e.code] = false; });

initGame();
gameLoop();
</script>
</body>
</html>
